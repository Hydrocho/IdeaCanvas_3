<!DOCTYPE html>
<html class="light" lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>IdeaCanvas | 보드 관리</title>
    <link rel="icon" type="image/svg+xml" href="img/favicon.svg"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#630ed4",
              surface: "#f8f9ff",
              "surface-container-lowest": "#ffffff",
              "surface-container-low": "#eff4ff",
              "surface-container-high": "#dce9ff",
              "outline-variant": "#ccc3d8",
              "on-surface": "#0b1c30",
              "on-surface-variant": "#4a4455",
              error: "#ba1a1a"
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"]
            }
          }
        }
      };
    </script>
</head>
<body class="bg-surface text-on-surface font-sans min-h-screen">
    <main class="max-w-3xl mx-auto px-5 py-8">
        <header class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8">
            <div>
                <p class="text-xs font-semibold text-primary uppercase tracking-wide">IdeaCanvas</p>
                <h1 class="text-3xl font-extrabold tracking-tight">보드 관리</h1>
                <p class="text-xs text-on-surface-variant mt-2">보드 ID: <span id="admin-board-id">확인 중</span></p>
            </div>
            <div class="flex items-center gap-2">
                <a id="admin-dashboard-link" href="index.html" class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-surface-container-lowest border border-outline-variant/60 text-sm font-semibold hover:bg-surface-container-high transition-colors">
                    <span class="material-symbols-outlined text-lg">dashboard</span>
                    대시보드
                </a>
                <a id="admin-back-to-board" href="index.html" class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-surface-container-lowest border border-outline-variant/60 text-sm font-semibold hover:bg-surface-container-high transition-colors">
                    <span class="material-symbols-outlined text-lg">arrow_back</span>
                    보드로 이동
                </a>
            </div>
        </header>

        <section class="bg-surface-container-lowest border border-outline-variant/50 rounded-xl p-5 mb-5">
            <div class="flex items-center justify-between gap-3">
                <div>
                    <h2 class="font-bold text-lg">연결 상태</h2>
                    <p id="admin-connection-detail" class="text-sm text-on-surface-variant mt-1">Supabase 설정을 확인하는 중입니다.</p>
                </div>
                <span id="admin-connection-badge" class="px-3 py-1 rounded-full text-xs font-bold bg-surface-container-high text-on-surface-variant">확인 중</span>
            </div>
        </section>

        <section class="bg-surface-container-lowest border border-outline-variant/50 rounded-xl p-5 mb-5">
            <div class="mb-5">
                <h2 class="font-bold text-lg">보드 설정</h2>
                <p class="text-sm text-on-surface-variant mt-1">보드 제목과 글쓰기 정책은 서버에 저장됩니다.</p>
            </div>

            <form id="admin-board-settings-form" class="space-y-5">
                <div>
                    <label for="admin-board-title" class="block text-sm font-semibold mb-2">보드 제목</label>
                    <input id="admin-board-title" type="text" class="w-full rounded-xl border border-outline-variant/70 bg-white px-4 py-3 text-sm focus:ring-2 focus:ring-primary/30 focus:border-primary outline-none" placeholder="새로운 생각"/>
                </div>

                <div class="flex items-center justify-between gap-4 rounded-xl bg-surface-container-low p-4">
                    <div>
                        <p class="text-sm font-semibold">글쓰기 기능</p>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer select-none shrink-0">
                        <input id="admin-auth-write" class="sr-only peer" type="checkbox"/>
                        <div class="w-10 h-6 bg-outline-variant rounded-full peer peer-checked:after:translate-x-4 after:content-[''] after:absolute after:top-[3px] after:start-[3px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
                    </label>
                </div>

                <div class="flex items-center justify-end gap-3 pt-2">
                    <span id="admin-save-status" class="text-xs text-on-surface-variant"></span>
                    <button id="admin-save-btn" type="submit" class="px-5 py-2.5 rounded-xl bg-primary text-white text-sm font-bold hover:opacity-90 disabled:opacity-50 disabled:cursor-not-allowed">
                        저장
                    </button>
                </div>
            </form>
        </section>

        <section class="bg-surface-container-lowest border border-outline-variant/50 rounded-xl p-5">
            <div class="flex items-start justify-between gap-4 mb-5">
                <div>
                    <h2 class="font-bold text-lg">섹션 관리</h2>
                    <p class="text-sm text-on-surface-variant mt-1">이 보드의 칸반 섹션을 추가, 이름 변경, 삭제합니다.</p>
                </div>
                <button id="admin-add-section-btn" type="button" class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-primary text-white text-sm font-bold hover:opacity-90 disabled:opacity-50 disabled:cursor-not-allowed">
                    <span class="material-symbols-outlined text-lg">add</span>
                    섹션 추가
                </button>
            </div>

            <div id="admin-sections-list" class="space-y-3"></div>
            <p id="admin-section-status" class="text-xs text-on-surface-variant mt-4"></p>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase_config.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/boards.js"></script>
    <script src="js/section-utils.js"></script>
    <script src="js/sections.js"></script>
    <script src="js/board-settings-utils.js"></script>
    <script src="js/board-settings.js"></script>
    <script src="js/board-admin.js"></script>
</body>
</html>
